name: Publish

on:
  push:
    branches:
      - master
    paths:
      - "pubspec.yaml"

jobs:
  auto-tag:
    uses: ./.github/workflows/auto-tag.yml
    permissions:
      contents: write
    secrets:
      workflow_token: ${{ secrets.WORKFLOW_TOKEN }}

  release:
    needs: auto-tag
    if: needs.auto-tag.outputs.push_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag_name }}
          generate_release_notes: true

  publish:
    needs: release
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
